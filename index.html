<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KM23 Stock Count</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --primary: #1a56db;
    --success: #057a55;
    --danger:  #e02424;
    --warning: #ff8800;
    --bg:      #f3f4f6;
    --card:    #ffffff;
    --text:    #111827;
    --muted:   #6b7280;
    --border:  #e5e7eb;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Top bar ── */
  .topbar {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 1.1rem; font-weight: 700; }
  .topbar .loc { font-size: .8rem; opacity: .85; }

  /* ── Nav tabs ── */
  .nav {
    display: flex;
    background: #fff;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }
  .nav button {
    flex: 1;
    padding: 10px 4px;
    border: none;
    background: none;
    font-size: .85rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color .2s;
  }
  .nav button.active {
    color: var(--primary);
    border-bottom: 2px solid var(--primary);
    font-weight: 700;
  }

  /* ── Pages ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h3 { font-size: .95rem; margin-bottom: 8px; color: var(--primary); }

  /* ── Stats grid ── */
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
  .stat-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .stat-box .num { font-size: 1.6rem; font-weight: 800; }
  .stat-box .lbl { font-size: .72rem; color: var(--muted); }
  .stat-box.blue .num  { color: var(--primary); }
  .stat-box.green .num { color: var(--success); }
  .stat-box.red .num   { color: var(--danger); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
    font-size: .9rem; font-weight: 600; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-warn    { background: var(--warning); color: #fff; }
  .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
  .btn-block   { display: flex; width: 100%; margin-top: 8px; }
  .btn-sm      { padding: 6px 12px; font-size: .8rem; }

  /* ── QR Scanner ── */
  #qr-reader { width: 100%; border-radius: var(--radius); overflow: hidden; }
  #qr-result-box {
    margin-top: 10px; padding: 12px; border-radius: 8px;
    background: #eff6ff; border: 1px solid #bfdbfe; display: none;
  }
  #qr-result-box.found   { background: #f0fdf4; border-color: #86efac; }
  #qr-result-box.unknown { background: #fff7ed; border-color: #fed7aa; }
  #qr-result-box.dup     { background: #fef2f2; border-color: #fca5a5; }
  .result-asset { font-size: 1rem; font-weight: 700; }
  .result-name  { font-size: .85rem; color: var(--muted); }

  /* ── Manual input ── */
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; }
  .input-row input:focus { outline: none; border-color: var(--primary); }

  /* ── Asset list ── */
  .asset-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .asset-item:last-child { border-bottom: none; }
  .asset-badge {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1rem; flex-shrink: 0;
  }
  .badge-found   { background: #d1fae5; }
  .badge-missing { background: #fee2e2; }
  .badge-pending { background: #e5e7eb; }
  .asset-info { flex: 1; min-width: 0; }
  .asset-no   { font-size: .85rem; font-weight: 700; }
  .asset-name { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-found   { background: var(--success); }
  .dot-missing { background: var(--danger); }
  .dot-pending { background: #d1d5db; }

  /* ── Status action ── */
  .action-bar { display: flex; gap: 8px; margin-top: 12px; }
  .action-bar .btn { flex: 1; }

  /* ── Note input ── */
  textarea { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .9rem; resize: none; }
  textarea:focus { outline: none; border-color: var(--primary); }

  /* ── Settings ── */
  .setting-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .setting-row label { font-size: .85rem; font-weight: 600; color: var(--muted); }
  .setting-row input, .setting-row select {
    padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem;
  }
  .setting-row input:focus, .setting-row select:focus { outline: none; border-color: var(--primary); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 24px;
    font-size: .85rem; opacity: 0; pointer-events: none;
    transition: opacity .3s, transform .3s; z-index: 999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.green { background: var(--success); }
  #toast.red   { background: var(--danger); }

  /* ── Loading ── */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-msg { text-align: center; color: var(--muted); padding: 32px 0; font-size: .9rem; }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 10px; }
  .filter-bar input { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .85rem; }
  .chip {
    padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    font-size: .78rem; cursor: pointer; background: #fff; white-space: nowrap;
    transition: background .15s, border-color .15s;
  }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ── Debug box ── */
  #debug-box {
    background: #1f2937; color: #d1d5db; border-radius: 8px; padding: 12px;
    font-size: .75rem; font-family: monospace; max-height: 200px; overflow-y: auto;
    margin-top: 10px; display: none;
  }
  #debug-box p { margin: 2px 0; }
  #debug-box .ok  { color: #6ee7b7; }
  #debug-box .err { color: #fca5a5; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="topbar h1" style="font-size:1.1rem;font-weight:700;">📦 KM23 Stock Count</div>
    <div class="loc" id="topbar-loc">กำลังโหลด...</div>
  </div>
  <div id="topbar-count" style="font-size:.85rem;opacity:.9;"></div>
</div>

<!-- Nav -->
<div class="nav">
  <button class="active" onclick="switchPage('scan')">📷 สแกน</button>
  <button onclick="switchPage('list')">📋 รายการ</button>
  <button onclick="switchPage('summary')">📊 สรุป</button>
  <button onclick="switchPage('settings')">⚙️ ตั้งค่า</button>
</div>

<!-- ════════════ SCAN PAGE ════════════ -->
<div id="page-scan" class="page active">

  <div class="card">
    <h3>📷 สแกน Barcode / QR Code</h3>
    <div id="qr-reader"></div>

    <div id="qr-result-box">
      <div class="result-asset" id="res-assetno">—</div>
      <div class="result-name"  id="res-name">—</div>
      <div class="result-name"  id="res-loc" style="margin-top:2px;"></div>
    </div>

    <!-- Manual input -->
    <div style="margin-top:12px;">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:6px;">หรือพิมพ์หมายเลขครุภัณฑ์</div>
      <div class="input-row">
        <input type="text" id="manual-input" placeholder="เช่น OFF002916" autocomplete="off">
        <button class="btn btn-primary" onclick="handleManualSearch()">ค้นหา</button>
      </div>
    </div>
  </div>

  <!-- Action after finding asset -->
  <div id="action-card" class="card" style="display:none;">
    <h3 id="action-title">บันทึกผลการนับ</h3>
    <div class="setting-row" style="margin-top:8px;">
      <label>หมายเหตุ (ถ้ามี)</label>
      <textarea id="note-input" rows="2" placeholder="ระบุหมายเหตุ..."></textarea>
    </div>
    <div class="action-bar">
      <button class="btn btn-success" onclick="saveRecord('found')">✅ พบ</button>
      <button class="btn btn-danger"  onclick="saveRecord('missing')">❌ ไม่พบ</button>
      <button class="btn btn-warn"    onclick="saveRecord('damaged')">⚠️ ชำรุด</button>
    </div>
  </div>
</div>

<!-- ════════════ LIST PAGE ════════════ -->
<div id="page-list" class="page">
  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="ค้นหา..." oninput="renderList()">
    <div class="chip active" id="chip-all"     onclick="setFilter('all')">ทั้งหมด</div>
    <div class="chip"        id="chip-pending" onclick="setFilter('pending')">รอ</div>
    <div class="chip"        id="chip-found"   onclick="setFilter('found')">พบ</div>
    <div class="chip"        id="chip-missing" onclick="setFilter('missing')">ไม่พบ</div>
  </div>
  <div id="asset-list"></div>
</div>

<!-- ════════════ SUMMARY PAGE ════════════ -->
<div id="page-summary" class="page">
  <div class="stats">
    <div class="stat-box blue">
      <div class="num" id="s-total">0</div>
      <div class="lbl">ทั้งหมด</div>
    </div>
    <div class="stat-box green">
      <div class="num" id="s-found">0</div>
      <div class="lbl">พบแล้ว</div>
    </div>
    <div class="stat-box red">
      <div class="num" id="s-missing">0</div>
      <div class="lbl">ยังไม่พบ</div>
    </div>
  </div>

  <div class="card">
    <h3>ความคืบหน้า</h3>
    <div style="background:var(--border);border-radius:8px;height:12px;overflow:hidden;margin:8px 0;">
      <div id="progress-bar" style="background:var(--success);height:100%;border-radius:8px;width:0%;transition:width .5s;"></div>
    </div>
    <div id="progress-pct" style="text-align:right;font-size:.85rem;color:var(--muted);">0%</div>
  </div>

  <div class="card">
    <h3>ที่นับแล้ว (ล่าสุด)</h3>
    <div id="recent-list"><div class="empty-msg">ยังไม่มีข้อมูล</div></div>
  </div>

  <button class="btn btn-outline btn-block" onclick="exportCSV()">⬇️ Export CSV</button>
</div>

<!-- ════════════ SETTINGS PAGE ════════════ -->
<div id="page-settings" class="page">
  <div class="card">
    <h3>⚙️ ตั้งค่าการเชื่อมต่อ</h3>

    <div class="setting-row">
      <label>GAS Web App URL</label>
      <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="setting-row">
      <label>Location (สถานที่)</label>
      <input type="text" id="cfg-location" placeholder="เช่น KM23-คลังB">
    </div>
    <div class="setting-row">
      <label>ชื่อผู้นับ</label>
      <input type="text" id="cfg-user" placeholder="ชื่อ-นามสกุล">
    </div>

    <button class="btn btn-primary btn-block" onclick="saveSettings()">💾 บันทึกการตั้งค่า</button>
    <button class="btn btn-outline btn-block" onclick="testConnection()">🔌 ทดสอบการเชื่อมต่อ</button>
    <button class="btn btn-outline btn-block" onclick="loadAssets()">🔄 โหลด Asset ใหม่</button>
    <button class="btn btn-danger  btn-block" style="margin-top:16px;" onclick="clearData()">🗑️ ล้างข้อมูลทั้งหมด</button>

    <!-- Debug box -->
    <div id="debug-box"></div>
  </div>

  <div class="card" style="margin-top:4px;">
    <h3>ℹ️ ข้อมูลระบบ</h3>
    <div id="sys-info" style="font-size:.82rem;color:var(--muted);line-height:1.8;"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let cfg = { url: '', location: '', user: '' };
let assets   = [];   // [ { assetNumber, name, group, location } ]
let records  = {};   // { assetNumber: { status, note, ts } }
let currentAsset = null;
let filter   = 'all';
let scanner  = null;
let scannerRunning = false;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.onload = () => {
  loadLocal();
  updateTopbar();
  updateSummary();
  renderList();
  renderSysInfo();
  if (cfg.url && cfg.location) loadAssets();
  initScanner();
};

// ═══════════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════════
function loadLocal() {
  cfg     = JSON.parse(localStorage.getItem('km23_cfg')     || '{"url":"","location":"","user":""}');
  assets  = JSON.parse(localStorage.getItem('km23_assets')  || '[]');
  records = JSON.parse(localStorage.getItem('km23_records') || '{}');
  document.getElementById('cfg-url').value      = cfg.url;
  document.getElementById('cfg-location').value = cfg.location;
  document.getElementById('cfg-user').value     = cfg.user;
}
function saveLocal() {
  localStorage.setItem('km23_cfg',     JSON.stringify(cfg));
  localStorage.setItem('km23_assets',  JSON.stringify(assets));
  localStorage.setItem('km23_records', JSON.stringify(records));
}

// ═══════════════════════════════════════════════
// GAS API — ใช้ GET เท่านั้น
// ═══════════════════════════════════════════════
async function gasGET(params) {
  if (!cfg.url) throw new Error('ยังไม่ได้ตั้งค่า GAS URL');

  const url = new URL(cfg.url);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    method: 'GET',
    redirect: 'follow',
  });

  if (!res.ok) throw new Error('HTTP ' + res.status);

  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error('GAS ตอบกลับไม่ใช่ JSON: ' + text.substring(0, 200));
  }
}

// ═══════════════════════════════════════════════
// LOAD ASSETS
// ═══════════════════════════════════════════════
async function loadAssets() {
  if (!cfg.url)      return toast('⚠️ กรุณาตั้งค่า GAS URL ก่อน', 'red');
  if (!cfg.location) return toast('⚠️ กรุณาตั้งค่า Location ก่อน', 'red');

  toast('🔄 กำลังโหลด Asset...');
  debugLog('📡 loadAssets location=' + cfg.location, 'ok');

  try {
    const data = await gasGET({ action: 'getAssets', location: cfg.location });
    debugLog('ได้รับ: ' + JSON.stringify(data).substring(0, 300), data.ok ? 'ok' : 'err');

    if (!data.ok) throw new Error(data.error || 'GAS ตอบ ok=false');

    assets = data.assets || [];
    saveLocal();
    updateTopbar();
    updateSummary();
    renderList();
    toast('✅ โหลด ' + assets.length + ' รายการสำเร็จ', 'green');
  } catch (err) {
    debugLog('❌ ' + err.message, 'err');
    toast('❌ โหลดไม่สำเร็จ: ' + err.message, 'red');
  }
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function saveSettings() {
  cfg.url      = document.getElementById('cfg-url').value.trim();
  cfg.location = document.getElementById('cfg-location').value.trim();
  cfg.user     = document.getElementById('cfg-user').value.trim();
  saveLocal();
  updateTopbar();
  renderSysInfo();
  toast('✅ บันทึกการตั้งค่าแล้ว', 'green');
}

async function testConnection() {
  if (!cfg.url) return toast('⚠️ กรุณาใส่ GAS URL ก่อน', 'red');
  saveSettings();
  toast('🔌 กำลังทดสอบ...');
  debugLog('📡 ping GAS...', 'ok');
  showDebug(true);

  try {
    const data = await gasGET({ action: 'ping' });
    debugLog('✅ ping: ' + JSON.stringify(data), 'ok');
    toast('✅ เชื่อมต่อได้! ' + (data.time || ''), 'green');

    // ทดสอบ getAssets ด้วย
    const loc = cfg.location || document.getElementById('cfg-location').value.trim();
    if (loc) {
      const d2 = await gasGET({ action: 'getAssets', location: loc });
      debugLog('getAssets → ' + (d2.ok ? d2.total + ' items colIndex=' + JSON.stringify(d2.colIndex) : 'error: '+d2.error), d2.ok ? 'ok' : 'err');
    }
  } catch (err) {
    debugLog('❌ ' + err.message, 'err');
    toast('❌ ' + err.message, 'red');
  }
}

// ═══════════════════════════════════════════════
// SCANNER
// ═══════════════════════════════════════════════
function initScanner() {
  scanner = new Html5Qrcode('qr-reader');
  startScanner();
}

function startScanner() {
  if (scannerRunning) return;
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 260, height: 160 } },
    (code) => handleAssetScan(code.trim()),
    () => {}
  ).then(() => { scannerRunning = true; })
   .catch(err => debugLog('Scanner: ' + err, 'err'));
}

function handleAssetScan(code) {
  if (!code) return;
  document.getElementById('manual-input').value = code;
  handleManualSearch(code);
}

function handleManualSearch(forceCode) {
  const code = (forceCode || document.getElementById('manual-input').value).trim().toUpperCase();
  if (!code) return;

  const asset = assets.find(a => a.assetNumber.trim().toUpperCase() === code);
  const box   = document.getElementById('qr-result-box');
  const rec   = records[code];

  document.getElementById('action-card').style.display = 'none';
  document.getElementById('note-input').value = '';

  if (asset) {
    currentAsset = asset;
    box.className = rec ? (rec.status === 'found' ? 'found' : 'unknown') : 'found';
    box.style.display = 'block';
    document.getElementById('res-assetno').textContent = asset.assetNumber;
    document.getElementById('res-name').textContent    = asset.name;
    document.getElementById('res-loc').textContent     = asset.location;

    if (rec) {
      document.getElementById('action-title').textContent = `นับแล้ว (${statusLabel(rec.status)}) — บันทึกซ้ำ?`;
    } else {
      document.getElementById('action-title').textContent = 'บันทึกผลการนับ';
    }
    document.getElementById('action-card').style.display = 'block';
  } else {
    currentAsset = null;
    box.className = 'unknown';
    box.style.display = 'block';
    document.getElementById('res-assetno').textContent = code;
    document.getElementById('res-name').textContent    = '⚠️ ไม่พบในรายการ (assets โหลดแล้ว: ' + assets.length + ' รายการ)';
    document.getElementById('res-loc').textContent     = '';
    debugLog('ค้นหา "' + code + '" ใน ' + assets.length + ' items → ไม่พบ', 'err');

    // show first 3 for debug
    if (assets.length > 0) {
      debugLog('ตัวอย่าง: ' + assets.slice(0,3).map(a=>a.assetNumber).join(', '), 'ok');
      showDebug(true);
    }
  }
}

// ═══════════════════════════════════════════════
// SAVE RECORD
// ═══════════════════════════════════════════════
async function saveRecord(status) {
  if (!currentAsset) return toast('❌ ไม่มี asset ที่เลือก', 'red');
  if (!cfg.url)      return toast('⚠️ กรุณาตั้งค่า GAS URL ก่อน', 'red');

  const note = document.getElementById('note-input').value.trim();

  // บันทึก local ก่อนเสมอ (offline-first)
  const key = currentAsset.assetNumber.trim().toUpperCase();
  records[key] = { status, note, ts: new Date().toISOString(), name: currentAsset.name };
  saveLocal();
  updateSummary();
  renderList();
  toast('💾 บันทึก local แล้ว กำลังส่ง GAS...', 'green');

  // ส่ง GAS
  try {
    const data = await gasGET({
      action:      'saveRecord',
      assetNumber: currentAsset.assetNumber,
      name:        currentAsset.name,
      location:    currentAsset.location || cfg.location,
      status:      status,
      note:        note,
      countedBy:   cfg.user,
    });

    if (data.ok) {
      toast('✅ บันทึก GAS Sheet สำเร็จ (row ' + data.row + ')', 'green');
    } else {
      toast('⚠️ Local OK แต่ GAS: ' + data.error, 'red');
      debugLog('GAS error: ' + data.error, 'err');
    }
  } catch (err) {
    toast('⚠️ Local OK แต่ GAS offline: ' + err.message, 'red');
    debugLog('GAS offline: ' + err.message, 'err');
  }

  document.getElementById('action-card').style.display = 'none';
  document.getElementById('qr-result-box').style.display = 'none';
  document.getElementById('manual-input').value = '';
  currentAsset = null;
}

// ═══════════════════════════════════════════════
// RENDER LIST
// ═══════════════════════════════════════════════
function setFilter(f) {
  filter = f;
  ['all','pending','found','missing'].forEach(x => {
    document.getElementById('chip-'+x).classList.toggle('active', x===f);
  });
  renderList();
}

function renderList() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const el  = document.getElementById('asset-list');
  const arr = assets.filter(a => {
    const rec    = records[a.assetNumber.trim().toUpperCase()];
    const status = rec ? rec.status : 'pending';
    if (filter !== 'all' && status !== filter) return false;
    if (q && !a.assetNumber.toLowerCase().includes(q) && !a.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if (!arr.length) {
    el.innerHTML = '<div class="empty-msg">' + (assets.length ? 'ไม่พบรายการที่กรอง' : 'ยังไม่มี Asset (กด โหลด Asset ใน Settings)') + '</div>';
    return;
  }

  el.innerHTML = arr.map(a => {
    const key    = a.assetNumber.trim().toUpperCase();
    const rec    = records[key];
    const status = rec ? rec.status : 'pending';
    const emoji  = status === 'found' ? '✅' : status === 'missing' ? '❌' : status === 'damaged' ? '⚠️' : '🔲';
    return `<div class="asset-item">
      <div class="asset-badge badge-${status==='pending'?'pending':status==='found'?'found':'missing'}">${emoji}</div>
      <div class="asset-info">
        <div class="asset-no">${a.assetNumber}</div>
        <div class="asset-name">${a.name}</div>
      </div>
      <div class="status-dot dot-${status==='pending'?'pending':status==='found'?'found':'missing'}"></div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════
function updateSummary() {
  const total   = assets.length;
  const counted = Object.keys(records);
  const found   = counted.filter(k => records[k].status === 'found').length;
  const missing = counted.filter(k => records[k].status === 'missing').length;
  const damaged = counted.filter(k => records[k].status === 'damaged').length;
  const pct     = total ? Math.round(counted.length / total * 100) : 0;

  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-found').textContent   = found;
  document.getElementById('s-missing').textContent = missing + damaged;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';

  // Recent
  const recent = counted
    .map(k => ({ ...records[k], assetNumber: k }))
    .sort((a,b) => b.ts.localeCompare(a.ts))
    .slice(0, 10);

  const el = document.getElementById('recent-list');
  if (!recent.length) { el.innerHTML = '<div class="empty-msg">ยังไม่มีข้อมูล</div>'; return; }
  el.innerHTML = recent.map(r =>
    `<div class="asset-item">
      <div style="font-size:1.1rem;">${r.status==='found'?'✅':r.status==='missing'?'❌':'⚠️'}</div>
      <div class="asset-info">
        <div class="asset-no">${r.assetNumber}</div>
        <div class="asset-name">${r.name||''} — ${r.ts.replace('T',' ').substring(0,16)}</div>
      </div>
    </div>`
  ).join('');
}

function updateTopbar() {
  document.getElementById('topbar-loc').textContent   = cfg.location || 'ยังไม่ได้ตั้งค่า Location';
  document.getElementById('topbar-count').textContent = assets.length ? assets.length + ' รายการ' : '';
}

// ═══════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════
function exportCSV() {
  const rows = [['AssetNumber','Name','Location','Status','Note','Timestamp']];
  assets.forEach(a => {
    const key = a.assetNumber.trim().toUpperCase();
    const rec = records[key];
    rows.push([
      a.assetNumber, a.name, a.location,
      rec ? rec.status : 'pending',
      rec ? rec.note   : '',
      rec ? rec.ts     : '',
    ]);
  });
  const csv  = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href  = URL.createObjectURL(blob);
  link.download = 'km23_' + cfg.location + '_' + new Date().toISOString().substring(0,10) + '.csv';
  link.click();
}

// ═══════════════════════════════════════════════
// MISC HELPERS
// ═══════════════════════════════════════════════
function switchPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  event.currentTarget.classList.add('active');
  if (p === 'summary') updateSummary();
  if (p === 'list')    renderList();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent  = msg;
  el.className    = 'show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}

function statusLabel(s) {
  return { found:'พบ', missing:'ไม่พบ', damaged:'ชำรุด', pending:'รอ' }[s] || s;
}

function clearData() {
  if (!confirm('ล้างข้อมูลทั้งหมด (asset list + records) ?')) return;
  assets = []; records = {};
  saveLocal();
  updateTopbar(); updateSummary(); renderList();
  toast('🗑️ ล้างข้อมูลแล้ว');
}

function renderSysInfo() {
  document.getElementById('sys-info').innerHTML =
    `URL: ${cfg.url||'-'}<br>Location: ${cfg.location||'-'}<br>User: ${cfg.user||'-'}<br>Assets loaded: ${assets.length}<br>Records: ${Object.keys(records).length}`;
}

let debugVisible = false;
function showDebug(show) {
  debugVisible = show;
  document.getElementById('debug-box').style.display = show ? 'block' : 'none';
}
function debugLog(msg, cls='') {
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  const p = document.createElement('p');
  p.className   = cls;
  p.textContent = new Date().toLocaleTimeString('th') + ' ' + msg;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}
</script>
